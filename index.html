  <body>
    <div id="root">
      <style>
        .splash-screen {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background: hsl(330, 30%, 97%);
          font-family: 'Nunito', sans-serif;
          gap: 1.25rem;
        }
        .splash-spinner {
          width: 48px;
          height: 48px;
          border: 4px solid hsl(330, 30%, 88%);
          border-top-color: hsl(330, 80%, 65%);
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
        .splash-title {
          font-size: 1.5rem;
          font-weight: 800;
          color: hsl(280, 30%, 25%);
          letter-spacing: -0.02em;
        }
        .splash-sub {
          font-size: 0.875rem;
          color: hsl(280, 15%, 55%);
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="splash-screen">
        <div class="splash-spinner"></div>
        <div class="splash-title">EveCAD</div>
        <div class="splash-sub">Loading your workspace…</div>
      </div>
    </div>
